name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Docker login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/moldapi:latest .

    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/moldapi:latest

    - name: Deploy to Linux
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/moldapi:latest
          docker stop moldapi || true
          docker rm moldapi || true
          docker run -d -p 127.0.0.1:8089:8080 --name moldapi ${{ secrets.DOCKER_USERNAME }}/moldapi:latest
          


